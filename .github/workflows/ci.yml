name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test -Xswiftc -warnings-as-errors
      - name: Build release
        run: ./script/build_and_run.sh --package
      - name: Verify release archive exists
        run: test -s dist/AppDelta-v0.1.0-macos.zip
